<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Paper Tracker — DOI Adder</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1f2e; --ink2: #4a5568; --ink3: #a0aec0;
    --page: #f7f4ef; --page2: #efeae2; --page3: #e8e2d8;
    --accent: #2b5ce6; --accent-light: #ebf0fd;
    --success: #276749; --success-bg: #f0faf4;
    --error: #c53030; --error-bg: #fff5f5;
    --shadow-lg: 0 12px 48px rgba(26,31,46,0.15), 0 2px 8px rgba(26,31,46,0.08);
  }
  body {
    background: var(--page); color: var(--ink);
    font-family: 'Nunito', sans-serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 16px 80px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(43,92,230,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(43,92,230,0.04) 0%, transparent 50%);
  }
  .wrap { width: 100%; max-width: 560px; }
  .header { margin-bottom: 32px; }
  .header-rule { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: 16px; }
  .header h1 { font-family: 'Lora', serif; font-size: 32px; font-weight: 400; color: var(--ink); line-height: 1.15; margin-bottom: 8px; }
  .header h1 em { font-style: italic; color: var(--accent); }
  .header-sub { font-size: 14px; color: var(--ink3); line-height: 1.5; }
  .card { background: #fff; border-radius: 20px; padding: 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--page3); }
  .input-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .doi-input {
    flex: 1; background: var(--page); border: 1.5px solid var(--page3);
    border-radius: 12px; padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .doi-input:focus { border-color: var(--accent); background: #fff; }
  .doi-input::placeholder { color: var(--ink3); }
  .btn { border: none; border-radius: 12px; cursor: pointer; font-family: 'Nunito', sans-serif; font-weight: 700; transition: all 0.15s; white-space: nowrap; }
  .btn:active:not(:disabled) { transform: scale(0.96); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-fetch { background: var(--accent); color: #fff; padding: 12px 20px; font-size: 14px; }
  .btn-fetch:hover:not(:disabled) { background: #2451c7; }
  .btn-clear { background: var(--page2); color: var(--ink3); border: 1px solid var(--page3) !important; padding: 12px 14px; font-size: 15px; }
  .msg { border-radius: 10px; padding: 11px 14px; font-size: 13px; margin-bottom: 14px; display: none; }
  .msg.show { display: block; }
  .msg.error { background: var(--error-bg); border: 1px solid #fed7d7; color: var(--error); }
  .msg.success { background: var(--success-bg); border: 1px solid #c6f6d5; color: var(--success); text-align: center; font-size: 15px; font-weight: 700; padding: 16px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .preview { display: none; animation: fadeUp 0.25s ease; }
  .preview.show { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .divider { border: none; border-top: 1.5px solid var(--page2); margin: 18px 0; }
  .paper-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; color: var(--ink); line-height: 1.35; margin-bottom: 6px; }
  .paper-authors { font-size: 13px; color: var(--ink2); margin-bottom: 10px; line-height: 1.5; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--accent-light); color: var(--accent); border: 1px solid #c3d3f9; }
  .chip.muted { background: var(--page2); color: var(--ink3); border-color: var(--page3); }
  .abstract { font-family: 'Lora', serif; font-size: 13px; font-style: italic; color: var(--ink3); line-height: 1.7; border-left: 2px solid var(--page3); padding-left: 12px; }
  .field { margin-top: 16px; }
  .field-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 7px; }
  .options { display: flex; flex-wrap: wrap; gap: 6px; }
  .opt-btn { background: var(--page); color: var(--ink2); border: 1.5px solid var(--page3) !important; border-radius: 8px; padding: 5px 13px; font-size: 13px; font-family: 'Nunito', sans-serif; }
  .opt-btn:hover { border-color: var(--ink3) !important; }
  .opt-btn.active { background: var(--accent); color: #fff; border-color: var(--accent) !important; }
  .opt-btn.tag-active { background: var(--accent-light); color: var(--accent); border-color: #c3d3f9 !important; }
  textarea.notes { width: 100%; background: var(--page); border: 1.5px solid var(--page3); border-radius: 10px; padding: 10px 13px; font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--ink); resize: vertical; outline: none; transition: border-color 0.2s; margin-top: 2px; }
  textarea.notes:focus { border-color: var(--accent); background: #fff; }
  textarea.notes::placeholder { color: var(--ink3); }
  .btn-add { margin-top: 20px; width: 100%; background: var(--ink); color: #fff; border-radius: 12px; padding: 15px; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-add:hover:not(:disabled) { background: #2d3748; }
  .history { margin-top: 28px; display: none; }
  .history.show { display: block; }
  .history-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink3); margin-bottom: 10px; }
  .history-item { display: flex; justify-content: space-between; align-items: baseline; padding: 7px 0; border-bottom: 1px solid var(--page2); gap: 8px; }
  .history-item:last-child { border-bottom: none; }
  .history-name { font-size: 13px; color: var(--ink2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-family: 'Lora', serif; }
  .history-year { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink3); flex-shrink: 0; }
  .footer { margin-top: 24px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink3); letter-spacing: 0.05em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-rule"></div>
    <h1>Add paper by <em>DOI</em></h1>
    <div class="header-sub">Fetches from CrossRef · Saves directly to your Craft table · </div>
  </div>

  <div class="card">
    <div class="input-row">
      <input class="doi-input" id="doiInput" type="text"
        placeholder="10.1038/nature14539  or  https://doi.org/…"
        autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="btn btn-fetch" id="fetchBtn" onclick="handleFetch()">Fetch</button>
      <button class="btn btn-clear" id="clearBtn" onclick="handleClear()" style="display:none">✕</button>
    </div>

<div class="msg success" id="successMsg">✓ Added to your Craft table!</div>

<div class="preview" id="preview">
  <div class="paper-title" id="prevTitle"></div>
  <div class="paper-authors" id="prevAuthors"></div>
  <div class="chips" id="prevChips"></div>
  <div class="abstract" id="prevAbstract" style="display:none"></div>
  <hr class="divider">
  <div class="field">

    <div class="options" id="tagOpts"></div>

  <div class="field">

    <textarea class="notes" id="notesInput" rows="2" placeholder="Your thoughts…"></textarea>

  <div class="history" id="historyPanel">
    <div class="history-label">Added this session</div>
    <div id="historyList"></div>
  </div>

  <div class="footer">◈ crossref.org · craft.do</div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────
  const CRAFT_API   = "https://connect.craft.do/links/AI9Ijsf28Ql/api/v1";
  const COLLECTION_ID = "a6d35521-c29d-23e9-e19a-cc5cdf331299";
  const STATUS_OPTIONS = ["To Read", "Reading", "Done", "Cited"];
  const TAG_OPTIONS    = ["ML", "NLP", "CV", "Biology", "Medicine", "Physics", "Review"];

  let meta = null, selectedStatus = "To Read", selectedTags = [], history = [];

  // ── Build status buttons ────────────────────────────────────────────
  const statusEl = document.getElementById('statusOpts');
  STATUS_OPTIONS.forEach(s => {
    const b = document.createElement('button');
    b.className = 'btn opt-btn' + (s === selectedStatus ? ' active' : '');
    b.textContent = s;
    b.onclick = () => {
      selectedStatus = s;
      statusEl.querySelectorAll('.opt-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    };
    statusEl.appendChild(b);
  });

  // ── Build tag buttons ───────────────────────────────────────────────
  const tagEl = document.getElementById('tagOpts');
  TAG_OPTIONS.forEach(t => {
    const b = document.createElement('button');
    b.className = 'btn opt-btn';
    b.textContent = t;
    b.onclick = () => {
      if (selectedTags.includes(t)) { selectedTags = selectedTags.filter(x => x !== t); b.classList.remove('tag-active'); }
      else { selectedTags.push(t); b.classList.add('tag-active'); }
    };
    tagEl.appendChild(b);
  });

  // ── Helpers ─────────────────────────────────────────────────────────
  function showError(msg) { const e = document.getElementById('errorMsg'); e.textContent = '⚠ ' + msg; e.classList.add('show'); }
  function clearError()   { document.getElementById('errorMsg').classList.remove('show'); }
  function showSuccess()  { const e = document.getElementById('successMsg'); e.classList.add('show'); setTimeout(() => e.classList.remove('show'), 3000); }

  // ── Fetch DOI metadata from CrossRef ────────────────────────────────
  async function handleFetch() {
    const raw = document.getElementById('doiInput').value.trim();
    if (!raw) return;
    clearError();
    document.getElementById('preview').classList.remove('show');
    const fetchBtn = document.getElementById('fetchBtn');
    fetchBtn.disabled = true;
    fetchBtn.innerHTML = '<span class="spinner"></span>';

    try {
      const doi = raw.replace(/^https?:\/\/doi\.org\//i, '').trim();
      const res = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
      if (!res.ok) throw new Error("DOI not found — please check and try again.");
      const data = await res.json();
      const w = data.message;

      const authors = (w.author || []).map(a => [a.family, a.given].filter(Boolean).join(', ')).join('; ') || 'Unknown';
      const journal = w['container-title']?.[0] || w['short-container-title']?.[0] || w.publisher || 'Unknown';
      const year    = w.published?.['date-parts']?.[0]?.[0] || w['published-print']?.['date-parts']?.[0]?.[0] || w['published-online']?.['date-parts']?.[0]?.[0] || null;
      const title   = w.title?.[0] || 'Untitled';
      const abstract = w.abstract ? w.abstract.replace(/<[^>]+>/g, '').trim() : '';
      const url     = w.URL || `https://doi.org/${doi}`;

      meta = { title, authors, journal, year, abstract, url, doi };

      // Populate preview
      document.getElementById('prevTitle').textContent = title;
      document.getElementById('prevAuthors').textContent = authors.split(';').slice(0, 3).join(';') + (authors.split(';').length > 3 ? ' et al.' : '');

      const chips = document.getElementById('prevChips');
      chips.innerHTML = '';
      [journal, year ? String(year) : null, doi].filter(Boolean).forEach((c, i) => {
        const span = document.createElement('span');
        span.className = 'chip' + (i === 2 ? ' muted' : '');
        span.textContent = c;
        chips.appendChild(span);
      });

      const absEl = document.getElementById('prevAbstract');
      if (abstract) { absEl.textContent = abstract.slice(0, 280) + (abstract.length > 280 ? '…' : ''); absEl.style.display = 'block'; }
      else { absEl.style.display = 'none'; }

      document.getElementById('preview').classList.add('show');
      document.getElementById('clearBtn').style.display = 'block';
      fetchBtn.style.display = 'none';

    } catch (e) {
      showError(e.message);
      fetchBtn.disabled = false;
      fetchBtn.innerHTML = 'Fetch';
    }
  }

  // ── Clear form ───────────────────────────────────────────────────────
  function handleClear() {
    meta = null; selectedTags = []; selectedStatus = 'To Read';
    document.getElementById('doiInput').value = '';
    document.getElementById('preview').classList.remove('show');
    document.getElementById('clearBtn').style.display = 'none';
    document.getElementById('fetchBtn').style.display = 'block';
    document.getElementById('fetchBtn').disabled = false;
    document.getElementById('fetchBtn').innerHTML = 'Fetch';
    document.getElementById('notesInput').value = '';
    tagEl.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('tag-active'));
    statusEl.querySelectorAll('.opt-btn').forEach((b, i) => b.classList.toggle('active', STATUS_OPTIONS[i] === 'To Read'));
    clearError();
  }

  // ── Add to Craft via REST API ────────────────────────────────────────
  async function handleAdd() {
    if (!meta) return;
    const addBtn = document.getElementById('addBtn');
    addBtn.disabled = true;
    addBtn.innerHTML = '<span class="spinner"></span> Adding to Craft…';
    clearError();

    const notes = document.getElementById('notesInput').value;

    try {
      const response = await fetch(`${CRAFT_API}/collections/${COLLECTION_ID}/items`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          items: [{
            title: meta.title,
            properties: {
              doi:      meta.doi,
              authors:  meta.authors,
              journal:  meta.journal,
              year:     meta.year,
              status:   selectedStatus,
              tags:     selectedTags,
              abstract: meta.abstract,
              url:      meta.url,
              notes:    notes
            }
          }]
        })
      });

      if (!response.ok) {
        const err = await response.text();
        throw new Error(`Craft API error ${response.status}: ${err}`);
      }

      history.unshift({ title: meta.title, year: meta.year });
      renderHistory();
      showSuccess();
      handleClear();

    } catch (e) {
      showError(e.message || "Something went wrong. Please try again.");
      addBtn.disabled = false;
      addBtn.innerHTML = 'Add to Craft →';
    }
  }

  // ── History ──────────────────────────────────────────────────────────
  function renderHistory() {
    const panel = document.getElementById('historyPanel');
    const list  = document.getElementById('historyList');
    if (!history.length) { panel.classList.remove('show'); return; }
    panel.classList.add('show');
    list.innerHTML = '';
    history.slice(0, 6).forEach(h => {
      const row = document.createElement('div');
      row.className = 'history-item';
      row.innerHTML = `<span class="history-name">${h.title}</span><span class="history-year">${h.year || '—'}</span>`;
      list.appendChild(row);
    });
  }

  document.getElementById('doiInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleFetch(); });
</script>

</body>
</html>
